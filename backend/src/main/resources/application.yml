spring:
  application:
    name: chainsense-scm
  datasource:
    url: jdbc:postgresql://localhost:5433/chainsense
    username: chainsense
    password: chainsense
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${GEMINI_API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        options:
          model: gemini-2.5-flash-lite
          temperature: 0.3
          max-output-tokens: 4096
      embedding:
        enabled: false
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

server:
  port: 8080

chainsense:
  ai:
    max-retries: 2
    timeout-seconds: 30
  demo:
    access-code: TUM2026
